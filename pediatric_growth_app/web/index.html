<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童生长发育评估工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .calculator {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .gender-buttons {
            display: flex;
            gap: 10px;
        }

        .gender-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .gender-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .gender-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .btn-calculate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-calculate:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .result-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .result-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .result-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
        }

        .result-unit {
            font-size: 0.9rem;
            color: #999;
            margin-left: 2px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-normal {
            background: #d4edda;
            color: #155724;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-alert {
            background: #f8d7da;
            color: #721c24;
        }

        .interpretation {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            border-radius: 0 8px 8px 0;
            margin-top: 15px;
        }

        .interpretation-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .interpretation-text {
            color: #555;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .age-display {
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            color: #555;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #666;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s ease;
        }

        .tab:hover {
            background: #f0f0f0;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .calculator {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👶 儿童生长发育评估工具</h1>
            <p>基于 WHO 2006 儿童生长标准 | 适用于 0-5 岁儿童</p>
        </div>

        <div class="calculator">
            <div class="form-row">
                <div class="form-group">
                    <label>性别</label>
                    <div class="gender-buttons">
                        <button type="button" class="gender-btn active" data-gender="boy">男孩</button>
                        <button type="button" class="gender-btn" data-gender="girl">女孩</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>年龄</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="ageYears" placeholder="岁" min="0" max="5" value="0">
                        <input type="number" id="ageMonths" placeholder="月" min="0" max="11" value="6">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>身高 (cm)</label>
                    <input type="number" id="height" placeholder="请输入身高" min="30" max="130" step="0.1">
                </div>

                <div class="form-group">
                    <label>体重 (kg)</label>
                    <input type="number" id="weight" placeholder="请输入体重" min="1" max="40" step="0.01">
                </div>
            </div>

            <button class="btn-calculate" onclick="calculate()">开始评估</button>

            <div class="results" id="results">
                <div class="age-display" id="ageDisplay"></div>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab('weightAge')">体重/年龄</button>
                    <button class="tab" onclick="switchTab('heightAge')">身高/年龄</button>
                    <button class="tab" onclick="switchTab('weightHeight')">体重/身高</button>
                </div>

                <div id="weightAge" class="tab-content active"></div>
                <div id="heightAge" class="tab-content"></div>
                <div id="weightHeight" class="tab-content"></div>
            </div>
        </div>
    </div>

    <script>
        // WHO 生长标准数据 (简化版，实际应使用完整数据)
        const whoStandards = {

                },
                weightForHeight: {

                    70: { P3: 6.5, P15: 7.4, P50: 8.6, P85: 10.0, P97: 11.4, SD: 1.2 },
                    75: { P3: 7.4, P15: 8.4, P50: 9.7, P85: 11.3, P97: 12.8, SD: 1.3 },
                    80: { P3: 8.2, P15: 9.3, P50: 10.8, P85: 12.5, P97: 14.2, SD: 1.4 },
                    85: { P3: 9.0, P15: 10.2, P50: 11.8, P85: 13.7, P97: 15.5, SD: 1.5 },
                    90: { P3: 9.8, P15: 11.1, P50: 12.8, P85: 14.9, P97: 16.9, SD: 1.6 },
                    95: { P3: 10.5, P15: 11.9, P50: 13.8, P85: 16.0, P97: 18.2, SD: 1.7 },
                    100: { P3: 11.2, P15: 12.7, P50: 14.7, P85: 17.1, P97: 19.4, SD: 1.8 },
                    105: { P3: 11.9, P15: 13.5, P50: 15.6, P85: 18.2, P97: 20.7, SD: 1.9 },
                    110: { P3: 12.6, P15: 14.3, P50: 16.6, P85: 19.4, P97: 22.1, SD: 2.0 }
                }
            },
            girl: {
                weightForAge: {
                    0: { P3: 2.4, P15: 3.1, P50: 4.3, P85: 5.5, P97: 6.5, SD: 1.1 },
                    3: { P3: 4.6, P15: 5.4, P50: 6.5, P85: 7.6, P97: 8.6, SD: 1.0 },
                    6: { P3: 6.0, P15: 6.9, P50: 8.1, P85: 9.3, P97: 10.4, SD: 1.1 },
                    9: { P3: 7.1, P15: 8.1, P50: 9.3, P85: 10.6, P97: 11.8, SD: 1.2 },
                    12: { P3: 8.0, P15: 9.0, P50: 10.2, P85: 11.6, P97: 12.9, SD: 1.3 },
                    18: { P3: 9.3, P15: 10.3, P50: 11.7, P85: 13.3, P97: 14.7, SD: 1.4 },
                    24: { P3: 10.3, P15: 11.4, P50: 12.9, P85: 14.6, P97: 16.2, SD: 1.5 },
                    30: { P3: 11.2, P15: 12.4, P50: 14.0, P85: 15.9, P97: 17.6, SD: 1.6 },
                    36: { P3: 11.9, P15: 13.2, P50: 14.9, P85: 16.9, P97: 18.8, SD: 1.7 },
                    48: { P3: 13.1, P15: 14.6, P50: 16.5, P85: 18.7, P97: 20.8, SD: 1.9 },
                    60: { P3: 14.2, P15: 15.9, P50: 18.0, P85: 20.4, P97: 22.7, SD: 2.1 }
                },
                heightForAge: {
                    0: { P3: 45.5, P15: 47.5, P50: 49.5, P85: 51.5, P97: 53.5, SD: 2.0 },
                    3: { P3: 56.5, P15: 58.5, P50: 60.5, P85: 62.5, P97: 64.5, SD: 2.0 },
                    6: { P3: 62.0, P15: 64.0, P50: 66.0, P85: 68.0, P97: 70.0, SD: 2.0 },
                    9: { P3: 66.5, P15: 68.5, P50: 70.5, P85: 72.5, P97: 74.5, SD: 2.0 },
                    12: { P3: 70.0, P15: 72.0, P50: 74.0, P85: 76.0, P97: 78.0, SD: 2.0 },
                    18: { P3: 75.5, P15: 77.5, P50: 80.0, P85: 82.5, P97: 85.0, SD: 2.3 },
                    24: { P3: 79.5, P15: 81.5, P50: 84.0, P85: 86.5, P97: 89.0, SD: 2.4 },
                    30: { P3: 83.0, P15: 85.0, P50: 87.5, P85: 90.0, P97: 92.5, SD: 2.4 },
                    36: { P3: 86.0, P15: 88.0, P50: 90.5, P85: 93.0, P97: 95.5, SD: 2.4 },
                    48: { P3: 91.0, P15: 93.0, P50: 96.0, P85: 99.0, P97: 102.0, SD: 2.8 },
                    60: { P3: 95.0, P15: 97.0, P50: 100.5, P85: 104.0, P97: 107.5, SD: 3.0 }
                },
                weightForHeight: {
                    50: { P3: 2.9, P15: 3.4, P50: 4.0, P85: 4.7, P97: 5.5, SD: 0.7 },
                    55: { P3: 3.6, P15: 4.2, P50: 4.9, P85: 5.8, P97: 6.6, SD: 0.8 },
                    60: { P3: 4.4, P15: 5.1, P50: 5.9, P85: 6.9, P97: 7.9, SD: 0.9 },
                    65: { P3: 5.3, P15: 6.0, P50: 7.0, P85: 8.1, P97: 9.3, SD: 1.0 },
                    70: { P3: 6.1, P15: 6.9, P50: 8.0, P85: 9.3, P97: 10.6, SD: 1.1 },
                    75: { P3: 6.9, P15: 7.8, P50: 9.0, P85: 10.4, P97: 11.9, SD: 1.2 },
                    80: { P3: 7.7, P15: 8.7, P50: 10.0, P85: 11.6, P97: 13.2, SD: 1.3 },
                    85: { P3: 8.4, P15: 9.5, P50: 11.0, P85: 12.7, P97: 14.5, SD: 1.4 },
                    90: { P3: 9.2, P15: 10.3, P50: 11.9, P85: 13.8, P97: 15.7, SD: 1.5 },
                    95: { P3: 9.9, P15: 11.1, P50: 12.8, P85: 14.8, P97: 16.9, SD: 1.6 },
                    100: { P3: 10.6, P15: 11.9, P50: 13.7, P85: 15.8, P97: 18.0, SD: 1.7 },
                    105: { P3: 11.3, P15: 12.7, P50: 14.6, P85: 16.8, P97: 19.2, SD: 1.8 },
                    110: { P3: 12.0, P15: 13.5, P50: 15.5, P85: 17.9, P97: 20.4, SD: 1.9 }
                }
            }
        };

        let currentGender = 'boy';

        // 性别选择
        document.querySelectorAll('.gender-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentGender = this.dataset.gender;
            });
        });

        // Tab 切换
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // 插值计算
        function interpolate(data, key, value) {
            const keys = Object.keys(data).map(Number).sort((a, b) => a - b);
            
            if (value <= keys[0]) return data[keys[0]][key];
            if (value >= keys[keys.length - 1]) return data[keys[keys.length - 1]][key];
            
            for (let i = 0; i < keys.length - 1; i++) {
                if (value >= keys[i] && value <= keys[i + 1]) {
                    const ratio = (value - keys[i]) / (keys[i + 1] - keys[i]);
                    return data[keys[i]][key] + ratio * (data[keys[i + 1]][key] - data[keys[i]][key]);
                }
            }
        }

        // 评估等级
        function getAssessment(percentile, zScore) {
            if (percentile < 3 || zScore < -2) {
                return { status: 'alert', text: '低于正常范围，建议进一步评估' };
            } else if (percentile < 15 || zScore < -1) {
                return { status: 'warning', text: '偏下，需关注生长趋势' };
            } else if (percentile > 97 || zScore > 2) {
                return { status: 'warning', text: '高于正常范围，建议咨询医生' };
            } else if (percentile > 85 || zScore > 1) {
                return { status: 'normal', text: '偏上，属于正常范围' };
            } else {
                return { status: 'normal', text: '正常范围，生长良好' };
            }
        }

        // 计算 Z 评分
        function calculateZScore(value, median, sd) {
            return ((value - median) / sd).toFixed(2);
        }

        // 估算百分位
        function estimatePercentile(zScore) {
            // 简化的正态分布百分位估算
            const z = parseFloat(zScore);
            if (z <= -3) return 0.1;
            if (z <= -2) return 2.3;
            if (z <= -1) return 15.9;
            if (z <= 0) return 50 - (Math.abs(z) * 34.1);
            if (z <= 1) return 50 + (z * 34.1);
            if (z <= 2) return 84.1 + ((z - 1) * 13.6);
            if (z <= 3) return 97.7 + ((z - 2) * 2.2);
            return 99.9;
        }

        // 主计算函数
        function calculate() {
            const ageYears = parseInt(document.getElementById('ageYears').value) || 0;
            const ageMonths = parseInt(document.getElementById('ageMonths').value) || 0;
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);

            if (!height || !weight) {
                alert('请输入身高和体重');
                return;
            }

            const totalMonths = ageYears * 12 + ageMonths;
            
            if (totalMonths > 60) {
                alert('本工具适用于 0-5 岁（60 个月）儿童');
                return;
            }

            // 显示年龄
            document.getElementById('ageDisplay').textContent = 
                `评估对象：${currentGender === 'boy' ? '男孩' : '女孩'} | 年龄：${ageYears}岁${ageMonths}月（总计${totalMonths}个月）`;

            const data = whoStandards[currentGender];

            // 体重/年龄评估
            const weightAgeP50 = interpolate(data.weightForAge, 'P50', totalMonths);
            const weightAgeSD = interpolate(data.weightForAge, 'SD', totalMonths);
            const weightAgeZ = calculateZScore(weight, weightAgeP50, weightAgeSD);
            const weightAgePercentile = estimatePercentile(weightAgeZ).toFixed(1);
            const weightAgeAssessment = getAssessment(parseFloat(weightAgePercentile), parseFloat(weightAgeZ));

            document.getElementById('weightAge').innerHTML = `
                <div class="result-section">
                    <h3>📊 体重/年龄评估</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">实际体重</div>
                            <div class="result-value">${weight}<span class="result-unit">kg</span></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">参考中位数</div>
                            <div class="result-value">${weightAgeP50.toFixed(1)}<span class="result-unit">kg</span></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">百分位</div>
                            <div class="result-value">P${weightAgePercentile}</div>
                            <div class="status-badge status-${weightAgeAssessment.status}">${weightAgeAssessment.text}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Z 评分</div>
                            <div class="result-value">${weightAgeZ}</div>
                        </div>
                    </div>
                    <div class="interpretation">
                        <div class="interpretation-title">💡 临床解读</div>
                        <div class="interpretation-text">
                            该儿童体重位于同龄${currentGender === 'boy' ? '男孩' : '女孩'}的第${weightAgePercentile}百分位，
                            Z 评分为${weightAgeZ}。${weightAgeAssessment.text}。
                            建议结合生长曲线图连续监测生长趋势。
                        </div>
                    </div>
                </div>
            `;

            // 身高/年龄评估
            const heightAgeP50 = interpolate(data.heightForAge, 'P50', totalMonths);
            const heightAgeSD = interpolate(data.heightForAge, 'SD', totalMonths);
            const heightAgeZ = calculateZScore(height, heightAgeP50, heightAgeSD);
            const heightAgePercentile = estimatePercentile(heightAgeZ).toFixed(1);
            const heightAgeAssessment = getAssessment(parseFloat(heightAgePercentile), parseFloat(heightAgeZ));

            document.getElementById('heightAge').innerHTML = `
                <div class="result-section">
                    <h3>📏 身高/年龄评估</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">实际身高</div>
                            <div class="result-value">${height}<span class="result-unit">cm</span></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">参考中位数</div>
                            <div class="result-value">${heightAgeP50.toFixed(1)}<span class="result-unit">cm</span></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">百分位</div>
                            <div class="result-value">P${heightAgePercentile}</div>
                            <div class="status-badge status-${heightAgeAssessment.status}">${heightAgeAssessment.text}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Z 评分</div>
                            <div class="result-value">${heightAgeZ}</div>
                        </div>
                    </div>
                    <div class="interpretation">
                        <div class="interpretation-title">💡 临床解读</div>
                        <div class="interpretation-text">
                            该儿童身高位于同龄${currentGender === 'boy' ? '男孩' : '女孩'}的第${heightAgePercentile}百分位，
                            Z 评分为${heightAgeZ}。${heightAgeAssessment.text}。
                            身高增长需长期追踪观察。
                        </div>
                    </div>
                </div>
            `;

            // 体重/身高评估
            const heightRounded = Math.round(height / 5) * 5; // 四舍五入到最近的 5cm
            const weightHeightP50 = interpolate(data.weightForHeight, 'P50', heightRounded);
            const weightHeightSD = interpolate(data.weightForHeight, 'SD', heightRounded);
            const weightHeightZ = calculateZScore(weight, weightHeightP50, weightHeightSD);
            const weightHeightPercentile = estimatePercentile(weightHeightZ).toFixed(1);
            const weightHeightAssessment = getAssessment(parseFloat(weightHeightPercentile), parseFloat(weightHeightZ));

            document.getElementById('weightHeight').innerHTML = `
                <div class="result-section">
                    <h3>⚖️ 体重/身高评估</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">实际体重</div>
                            <div class="result-value">${weight}<span class="result-unit">kg</span></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">参考身高</div>
                            <div class="result-value">${heightRounded}<span class="result-unit">cm</span></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">百分位</div>
                            <div class="result-value">P${weightHeightPercentile}</div>
                            <div class="status-badge status-${weightHeightAssessment.status}">${weightHeightAssessment.text}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Z 评分</div>
                            <div class="result-value">${weightHeightZ}</div>
                        </div>
                    </div>
                    <div class="interpretation">
                        <div class="interpretation-title">💡 临床解读</div>
                        <div class="interpretation-text">
                            该儿童体重相对于身高的位置位于第${weightHeightPercentile}百分位，
                            Z 评分为${weightHeightZ}。${weightHeightAssessment.text}。
                            此指标反映近期营养状况。
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('results').classList.add('show');
            
            // 滚动到结果区域
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 回车键触发计算
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
    </script>
</body>
</html>
